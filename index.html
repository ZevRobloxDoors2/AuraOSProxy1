  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap");
    
    :root {
      --primary-color: white;
      --secondary-color: #c4c4c4;
      --background-color: #0f0f0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--background-color);
      font-family: "Inter", sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    h1, h2, h3 {
      color: var(--primary-color);
      margin: 0;
    }

    a {
      color: var(--secondary-color);
      text-decoration: none;
    }

    ul.navbar {
      list-style-type: none;
      margin: 0;
      z-index: 2;
      padding: 0;
      overflow: hidden;
      background-color: #333;
      position: absolute;
      width: 100%;
      top: 0px;
      left: 0px;
    }

    li.nav-item {
      float: left;
      cursor: pointer !important;
    }

    li.nav-item a {
      display: block;
      color: white;
      transition: all 1s;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }

    li.nav-item a:hover {
      background-color: #444;
    }

    #frame {
      border: 0px solid black;
      position: absolute;
      width: 100%;
      z-index: 1;
      height: 100%;
      bottom: 0px;
      left: 0px;
    }

    #title {
      width: 100%;
      position: absolute;
      bottom: 60%;
      left: 0px;
      text-align: center;
      color: var(--primary-color);
      text-shadow: 3px 6px 2px var(--secondary-color);
    }

    #searchbar {
      width: 70%;
      position: absolute;
      bottom: 45%;
      left: 15%;
      height: 50px;
      padding: 10px;
      border-radius: 25px;
      background: transparent;
      border: 3px solid var(--primary-color);
      text-align: center;
      color: var(--primary-color);
      font-family: "Inter", sans-serif;
      transition: all 1s;
    }

    #searchbar:hover {
      transform: translateY(-5%);
      background-color: #151414;
    }

    #searchbar::placeholder {
      color: var(--primary-color);
    }

    #searchbar:focus {
      outline: none;
      background-color: rgba(21, 20, 20, 0.5);
    }

    .particles {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      pointer-events: none;
    }

    .particle {
      flex: 1;
      position: relative;
      top: -10%;
      animation: snowflakes-fall 15s linear, snowflakes-shake 5s ease-in-out;
      animation-delay: var(--d);
      animation-iteration-count: infinite;
      width: 10%;
      height: 10%;
      color: white;
      font-size: 2em;
    }

    @keyframes snowflakes-fall {
      100% {
        top: 100%;
      }
    }

    @keyframes snowflakes-shake {
      50% {
        transform: translateX(100px) rotate(5deg);
      }
    }

    .searchform {
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<script src="./app/uv/uv.bundle.js" defer></script>
<script src="./app/uv/uv.config.js" defer></script>

<script>
  // ===== Search Function (from search.js) =====
  function search(input, template) {
    try {
      return new URL(input).toString();
    } catch (err) {
      // input was not a valid URL
    }

    try {
      const url = new URL(`http://${input}`);
      if (url.hostname.includes(".")) return url.toString();
    } catch (err) {
      // input was not valid URL
    }

    return template.replace("%s", encodeURIComponent(input));
  }

  // ===== Service Worker Registration (from register-sw.js) =====
  const stockSW = "./app/uv-sw.js";
  const swAllowedHostnames = ["localhost", "127.0.0.1"];

  async function registerSW() {
    if (
      location.protocol !== "https:" &&
      !swAllowedHostnames.includes(location.hostname)
    ) {
      console.warn("Service workers only work over https (except on localhost)");
      return;
    }

    if (!navigator.serviceWorker) {
      console.warn("Your browser doesn't support service workers.");
      return;
    }

    try {
      await navigator.serviceWorker.register(stockSW, {
        scope: __uv$config ? __uv$config.prefix : '/service/',
      });
      console.log("Service worker registered successfully");
    } catch (err) {
      console.warn("Service worker registration failed:", err);
    }
  }

  // ===== Main UI Initialization =====
  document.addEventListener('DOMContentLoaded', function() {
    var searchbar = document.getElementById("searchbar");
    var searchform = document.getElementById("searchform");
    var titleEl = document.getElementById("title");

    // Responsive font sizing
    var fontsize = (2560 / screen.width) * 17.5;
    var fontsize2 = (2560 / screen.width) * 6.5;
    if (titleEl) titleEl.style.fontSize = fontsize + "px";
    if (searchbar) searchbar.style.fontSize = fontsize2 + "px";

    // Search form submission
    if (searchform) {
      searchform.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          if (typeof registerSW === 'function') {
            await registerSW();
          }
        } catch (err) {
          console.error("Service worker registration error:", err.toString());
        }

        if (typeof search === 'function' && typeof __uv$config !== 'undefined') {
          const url = search(searchbar.value, "https://www.google.com/search?q=%s");
          window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        } else {
          console.warn("Proxy functionality not available. Opening search in new tab.");
          const query = encodeURIComponent(searchbar.value);
          window.open(`https://www.google.com/search?q=${query}`, '_blank');
        }
      });
    }

    // Frame management (for tab persistence)
    var frame = document.getElementById("frame");
    function get_cookie(cookie_name) {
      const value = "; " + document.cookie;
      const parts = value.split("; " + cookie_name + "=");
      if (parts.length === 2) return parts.pop().split(";").shift();
      return null;
    }

    if (frame) {
      if (get_cookie("location") != null) {
        frame.src = get_cookie("location");
      }
      var navbar = document.getElementsByClassName("navbar")[0];
      if (navbar) {
        frame.style.height = (window.innerHeight - navbar.offsetHeight + 5) + "px";
        setInterval(function() {
          try {
            var locationHref = frame.contentWindow.location.href;
            document.cookie = "location=" + locationHref.replace(window.location.origin, "") + "; expires=Thu, 18 Dec 9013 12:00:00 UTC; path=/";
          } catch (e) {
            // Cross-origin frame access error, ignore
          }
        }, 100);
      }
    }

    // About:blank cloaking
    function checkPopups() {
      var newWin = window.open("", "", "width=100, height=100");
      if (newWin) {
        newWin.close();
        return true;
      } else {
        alert("HELLO! For auto cloaking in about:blank please allow pop ups!");
        return false;
      }
    }

    window.addEventListener('load', function () {
      var currentUrl = window.location.href;
      if (currentUrl !== "about:blank" && !sessionStorage.getItem('tabOpened')) {
        if (checkPopups()) {
          sessionStorage.setItem('tabOpened', 'true');
          try {
            var win = window.open('about:blank', '_blank');
            if (win) {
              win.document.write("<html style='height:100%; margin:0; padding:0;'><body style='height:100%; margin:0; padding:0;'><iframe src='" + currentUrl + "' style='width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;'></iframe></body></html>");
              win.onbeforeunload = function () {
                sessionStorage.removeItem('tabOpened');
              };
              window.close();
            }
          } catch (e) {
            console.warn("About:blank cloaking not available");
          }
        } else if (!sessionStorage.getItem('alertShown')) {
          sessionStorage.setItem('alertShown', 'true');
        }
      }
    });

    // Clear cookies on # key press
    window.addEventListener('keydown', (event) => {
      if (event.key === '#') {
        document.cookie.split(";").forEach(cookie => {
          document.cookie = cookie.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
        });
        alert('All saved cookie data cleared');
        location.reload(true);
      }
    });

    // Handle window resize for responsive layout
    window.addEventListener('resize', function() {
      if (titleEl) titleEl.style.fontSize = (2560 / screen.width) * 17.5 + "px";
      if (searchbar) searchbar.style.fontSize = (2560 / screen.width) * 6.5 + "px";
      if (frame && navbar) {
        frame.style.height = (window.innerHeight - navbar.offsetHeight + 5) + "px";
      }
    });
  });
</script>
